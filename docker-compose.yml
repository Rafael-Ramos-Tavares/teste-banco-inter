version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todo-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword@123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d
    networks:
      - todo-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword@123 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Todo List API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: todo_db
      DB_USER: sa
      DB_PASSWORD: "YourPassword@123"
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - todo-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Optional: Adminer (Database Management UI)
  adminer:
    image: adminer:latest
    container_name: todo-adminer
    ports:
      - "8081:8080"
    depends_on:
      - sqlserver
    networks:
      - todo-network
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  todo-network:
    driver: bridge
