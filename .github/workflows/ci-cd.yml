name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main, release/**, hotfix/** ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: SqlServer@123
        options: >-
          --health-cmd="/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer@123 -Q 'SELECT 1' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 1433:1433
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Necessário para análise de histórico git
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Wait for SQL Server
      run: |
        until /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer@123 -Q "SELECT 1" > /dev/null 2>&1; do
          echo "Waiting for SQL Server..."
          sleep 5
        done
    
    - name: Create Database
      run: |
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer@123 -Q "CREATE DATABASE todo_db"
    
    - name: Run Database Migration
      run: |
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer@123 -d todo_db -i src/main/resources/db/migration/V1__init_database.sql
    
    - name: Build with Maven
      env:
        DB_HOST: localhost
        DB_PORT: 1433
        DB_NAME: todo_db
        DB_USER: sa
        DB_PASSWORD: SqlServer@123
      run: mvn clean package -DskipTests
    
    - name: Run Tests
      env:
        DB_HOST: localhost
        DB_PORT: 1433
        DB_NAME: todo_db
        DB_USER: sa
        DB_PASSWORD: SqlServer@123
      run: mvn test
    
    - name: Generate Coverage Report
      run: mvn clean test jacoco:report
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Run Code Quality Analysis (SonarQube)
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=todo-list-api \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} || echo "SonarQube analysis skipped"
      continue-on-error: true
    
    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: todo-list-api-jar
        path: target/todo-list-api-*.jar
        retention-days: 5

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v3
      with:
        name: todo-list-api-jar
    
    - name: Deploy to Development
      env:
        DEPLOY_HOST: ${{ secrets.DEV_HOST }}
        DEPLOY_USER: ${{ secrets.DEV_USER }}
        DEPLOY_KEY: ${{ secrets.DEV_SSH_KEY }}
      run: |
        echo "Deploying to development environment..."
        # Adicionar comandos de deploy aqui
        # Exemplo: scp, ssh, ansible, etc.

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v3
      with:
        name: todo-list-api-jar
    
    - name: Deploy to Staging
      env:
        DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
        DEPLOY_USER: ${{ secrets.STAGING_USER }}
        DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
      run: |
        echo "Deploying to staging environment..."
        # Adicionar comandos de deploy aqui

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v3
      with:
        name: todo-list-api-jar
    
    - name: Deploy to Production
      env:
        DEPLOY_HOST: ${{ secrets.PROD_HOST }}
        DEPLOY_USER: ${{ secrets.PROD_USER }}
        DEPLOY_KEY: ${{ secrets.PROD_SSH_KEY }}
      run: |
        echo "Deploying to production environment..."
        # Adicionar comandos de deploy aqui

  notify:
    needs: [ build, deploy-dev, deploy-staging, deploy-production ]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Build Status
      run: |
        if [ "${{ needs.build.result }}" == "success" ]; then
          echo "✅ Build and tests passed!"
        else
          echo "❌ Build or tests failed!"
        fi
